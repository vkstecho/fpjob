function log(msg, type='info'){
  var el=document.getElementById('log');
  el.innerHTML+='<div class="'+type+'">'+msg+'</div>';
  el.scrollTop=el.scrollHeight;
}

window.startUpload = async function(){
  var btn=document.getElementById('btn');
  btn.disabled=true; btn.textContent='Uploading...';
  var keys=Object.keys(CONTACTS);
  var done=0, errs=0;
  log('Starting upload of '+keys.length+' contacts...','info');
  
  // Upload in batches of 50
  var batchSize=50;
  for(var i=0;i<keys.length;i+=batchSize){
    var batch={};
    var slice=keys.slice(i,i+batchSize);
    slice.forEach(k=>batch['users/'+k]=CONTACTS[k]);
    try{
      await update(ref(db), batch);
      done+=slice.length;
      document.getElementById('prog').value=done;
      document.getElementById('status').textContent=done+'/'+keys.length+' uploaded';
      if(done%200===0) log('✅ '+done+' contacts saved','ok');
    }catch(e){
      errs++;
      log('❌ Batch error at '+i+': '+e.message,'err');
      await new Promise(r=>setTimeout(r,1000));
    }
  }
  log('\n🎉 DONE! '+done+' contacts uploaded, '+errs+' errors','ok');
  btn.textContent='✅ Upload Complete!';
  document.getElementById('status').textContent='Done! '+done+' contacts in Firebase';
};
</script>
